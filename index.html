<script>
// حماية الصفحات – التحقق من تسجيل الدخول
(function(){

  // لا يسمح بالدخول بدون تسجيل دخول
  let user = localStorage.getItem("username");
  let role = localStorage.getItem("role");
  let last = localStorage.getItem("loginDate");

  // ممنوع الدخول إذا مافي مستخدم
  if(!user || !role){
    location.href = "https://www.prudle-education.com/log-in-out";
    return;
  }

  // التحقق من تاريخ آخر دخول (Auto Logout)
  let today = new Date().toDateString();
  if(last !== today){
    localStorage.clear();
    location.href = "https://www.prudle-education.com/log-in-out";
    return;
  }

})();
</script>

.exam-card{

  isolation:isolate;
  transition:
    transform .35s ease,
    box-shadow .35s ease,
    border-color .35s ease,
    background .35s ease;
}

.exam-card::before{
  content:"";
  position:absolute;
  inset:-60%;
  background:linear-gradient(
    120deg,
    transparent 35%,
    rgba(255,255,255,.75) 50%,
    transparent 65%
  );
  transform:translateX(-120%) rotate(15deg);
  transition:.7s ease;
  z-index:0;
}

.exam-card::after{
  content:"□ Preview";
  position:absolute;
  bottom:14px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#164478;
  color:#fff;
  padding:8px 18px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
  opacity:0;
  transition:.35s ease;
  box-shadow:0 10px 24px rgba(22,68,120,.25);
  z-index:3;
}

  position:relative;
  z-index:2;

}

}

  opacity:1;

}

const db = firebase.firestore();
async function allowStudentRetake(examId, courseId, studentId, iqama){

  const docId = `${examId}__${courseId}__${studentId}`;

  await db.collection("examRetakes")
    .doc(docId)
    .set({
      examId,
      courseId,
      studentId,

/* ================= أدوات ================= */
function norm(v){
  return String(v || "").trim().toLowerCase();
}
function normalizeTextAnswer(val){
  return String(val || "")
    .replace(/[^\w\s\u0600-\u06FF]/g, "") // حذف الرموز
    .replace(/\s+/g, " ")                 // توحيد المسافات
    .trim()
    .toLowerCase();
}
function sameType(courseType, filterType){
  const c = norm(courseType);
  const f = norm(filterType);

  if(!f) return true;

  const onlineAliases = ["online","اونلاين","أونلاين","online course","remote"];
  const offlineAliases = ["offline","حضوري","in person","onsite"];

  if(f === "online" && onlineAliases.includes(c)) return true;
  if(f === "offline" && offlineAliases.includes(c)) return true;

  return false;
}

function esc(str){

  return String(str || "")

    // تنظيف الرموز الغريبة فقط
    .replace(/□/g, "")
    .replace(/�/g, "")

    // حماية HTML
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");

}
function getDuration(){
  const hh = Math.max(Number(h.value || 0), 0);
  const mm = Math.max(Number(m.value || 0), 0);
  const ss = Math.max(Number(s.value || 0), 0);
  return (hh * 3600) + (mm * 60) + ss;
}

function secondsToHMS(total){
  total = Number(total || 0);
  const hh = Math.floor(total / 3600);
  const mm = Math.floor((total % 3600) / 60);
  const ss = total % 60;
  return `${hh}س ${mm}د ${ss}ث`;
}

function getOptions(){
  return [opt1.value, opt2.value, opt3.value, opt4.value]
    .map(v => String(v || "").trim())
    .filter(v => v);
}

function renderMedia(mediaType, mediaUrl){
  if(!mediaUrl || mediaType === "none") return "";

  if(mediaType === "image"){
    return `<div class="media-box"><img src="${mediaUrl}" alt="image"></div>`;
  }

  if(mediaType === "video"){
    return `<div class="media-box"><video controls src="${mediaUrl}"></video></div>`;
  }

  if(mediaType === "audio"){
    return `<div class="media-box"><audio controls src="${mediaUrl}"></audio></div>`;
  }

  return "";
}

function dedupeCoursesUsed(list){
  const seen = new Set();
  const out = [];

  (list || []).forEach(item=>{
    const key = `${item.courseId || ""}__${item.TrainingCourse || ""}__${item.Trainer || ""}`;
    if(!seen.has(key)){
      seen.add(key);
      out.push(item);
    }
  });

  return out;
}

async function uploadFileToCloudinary(fileObj){
  if(!fileObj) throw new Error("لا يوجد ملف");

  const form = new FormData();
  form.append("file", fileObj);
  form.append("upload_preset", "kcgfhigd");

  const url = "https://api.cloudinary.com/v1_1/dgs6mo4hl/auto/upload";

  const res = await fetch(url, {
    method: "POST",
    body: form
  });

  const text = await res.text();
  console.log("RAW RESPONSE:", text);

  let data;
  try{
    data = JSON.parse(text);
  }catch(e){
    throw new Error("استجابة غير مفهومة من السيرفر");
  }

  console.log("Cloudinary:", data);

  if(!data.secure_url){
    throw new Error(data.error?.message || "Cloudinary رفض الملف");
  }

  return data.secure_url;
}

async function saveQuestion(){

  if(!examId){
    return alert("Choose the exam first");
  }

  // □ جلب آخر ترتيب
  const lastSnap = await db.collection("questions")
    .where("examId","==",examId)
    .get();

  let newOrder = 1;

  if(!lastSnap.empty){

    const orders = lastSnap.docs.map(d =>
      Number(d.data().order || 0)
    );

    newOrder = Math.max(...orders, 0) + 1;
  }

  const qText = String(question.value || "").trim();
  const options = getOptions();

  const deg   = Number(degree.value || 0);
  const type  = qType.value;
  const media = mediaType.value;

  const fileObj = file.files[0];

  const showMedia = true;

  const group =
    document.getElementById("groupSelect")?.value || "General";

  if(!qText){
    return alert("اكتب السؤال");
  }

  if(
    (type === "mcq" ||
     type === "order" ||
     type === "match")
     &&
     options.length < 2
  ){
    return alert("أدخل خيارين على الأقل");
  }

  if(deg <= 0){
    return alert("out of");
  }

  let correctAnswer;

  // ================= VOICE =================
  if(type === "voice"){

    correctAnswer = "voice";
  }

  // ================= ORDER =================
  else if(type === "order"){

    correctAnswer = [...options];
  }

  // ================= TEXT =================
  else if(type === "text"){

    correctAnswer = String(correct.value || "")
      .split(",")
      .map(v => normalizeTextAnswer(v))
      .filter(v => v);
  }

  // ================= MATCH =================
  else if(type === "match"){

    const pairs = options.map(op=>{

      const [a,b] = op.split("=");

      if(!a || !b) return null;

      return {
        left: a.trim(),
        right: b.trim()
      };

    }).filter(v=>v);

    if(pairs.length < 2){
      return alert("اكتب خيارات التوصيل بهذا الشكل: cat=قطة");
    }

    correctAnswer = pairs;
  }

  // ================= MCQ =================
  else{

    const i = Number(correct.value);

    if(
      isNaN(i) ||
      i < 0 ||
      i >= options.length
    ){
      return alert("No. of the correct answer");
    }

    correctAnswer = i;
  }

  // ================= EXAM =================
  const examDoc = await db.collection("exams")
    .doc(examId)
    .get();

  if(!examDoc.exists){
    return alert("الاختبار غير موجود");
  }

  const exam = examDoc.data();




  // ================= MEDIA =================
  let mediaUrl = "";
  let finalMediaType = media;

  if(fileObj){

    try{

      const mime = fileObj.type || "";

      if(mime.startsWith("image/")){
        finalMediaType = "image";
      }

      else if(mime.startsWith("video/")){
        finalMediaType = "video";
      }

      else if(mime.startsWith("audio/")){
        finalMediaType = "audio";
      }

      else{
        return alert("نوع الملف غير مدعوم");
      }

      mediaUrl = await uploadFileToCloudinary(fileObj);

    }catch(err){

      console.error(err);

      return alert("فشل رفع الملف: " + err.message);
    }
  }

  // =========================================================
  // ======================== UPDATE =========================
  // =========================================================

  if(EDIT_QUESTION_ID){

    const oldDoc = await db.collection("questions")
      .doc(EDIT_QUESTION_ID)
      .get();

    const oldData = oldDoc.exists
      ? oldDoc.data()
      : {};

    const data = {
locked:
  oldData.locked === true,

      examId: examId,

      question: qText,

      passage:
        CURRENT_PASSAGE ||
        oldData.passage ||
        "",

      options: options,

      correct: correctAnswer,

      degree: deg,

      type: type,

      mediaType:
        fileObj
          ? finalMediaType
          : (oldData.mediaType || "none"),

      mediaUrl:
        fileObj
          ? mediaUrl
          : (oldData.mediaUrl || ""),

      group: group,

      showMedia: true,

      // □ المحافظة على الترتيب القديم
      order: oldData.order ?? 0,

      coursesUsed: dedupeCoursesUsed([

        ...(oldData.coursesUsed || []),

        ...(exam.coursesData || []).map(c => ({

        }))

await db.collection("questions")

// =====================================

    if(validAnswers.includes(normalizedStudent)){
      earned = Number(deg || 0);

  }

  else if(type === "order"){

    }

  }

  else if(type === "match"){

      );

}

async function editQuestion(id){
  const doc = await db.collection("questions").doc(id).get();

  if(!doc.exists){
    alert("السؤال غير موجود");
    return;
  }

  const q = doc.data();

  EDIT_QUESTION_ID = id;

  question.value = q.question || "";
  opt1.value = q.options?.[0] || "";
  opt2.value = q.options?.[1] || "";
  opt3.value = q.options?.[2] || "";
  opt4.value = q.options?.[3] || "";
  degree.value = q.degree || "";
  qType.value = q.type || "mcq";
  mediaType.value = q.mediaType || "none";

  if(q.type === "mcq"){
    correct.value = q.correct;
  }

  else if(q.type === "text"){
    correct.value = Array.isArray(q.correct) ? q.correct.join(", ") : "";
  }

  else if(q.type === "match"){
    const pairs = Array.isArray(q.correct) ? q.correct : [];

    opt1.value = pairs[0] ? `${pairs[0].left}=${pairs[0].right}` : "";
    opt2.value = pairs[1] ? `${pairs[1].left}=${pairs[1].right}` : "";
    opt3.value = pairs[2] ? `${pairs[2].left}=${pairs[2].right}` : "";
    opt4.value = pairs[3] ? `${pairs[3].left}=${pairs[3].right}` : "";

    correct.value = "";
  }

  else{
    correct.value = "";
  }

  if(q.examId){
    examSelect.value = q.examId;
  }

  toggleQuestionType();

async function toggleLinkedCourseQuestions(courseId, show){

  const examId = CURRENT_PREVIEW_EXAM;

  if(!examId || !courseId){
    alert("Choose exam and course first");
    return;
  }

  const examRef =
    db.collection("exams").doc(examId);

  const examDoc =
    await examRef.get();

  if(!examDoc.exists){
    alert("Exam not found");
    return;
  }

  const examData =
    examDoc.data() || {};

  const visibleMap =
    examData.visibleQuestionsByCourse || {};

  const qSnap =
    await db.collection("questions")
      .where("examId","==",examId)
      .get();

  const ids = [];

  qSnap.forEach(doc=>{

    const q =
      doc.data() || {};

    const used =
      Array.isArray(q.coursesUsed)
        ? q.coursesUsed
        : [];

    const belongs =
      used.some(c =>
        String(c.courseId || "").trim() ===
        String(courseId || "").trim()
      );

    if(belongs){
      ids.push(doc.id);
    }

  });

  if(show){
    visibleMap[courseId] = ids;
  }else{
    visibleMap[courseId] = [];
  }

    visibleQuestionsByCourse: visibleMap
  });

async function autoSaveVisibleQuestions(){

  const examId = CURRENT_PREVIEW_EXAM;

  if(!examId) return;

  if(!CURRENT_COURSE_ID) return;

  // الأسئلة المحددة فقط
  const selected = [];

  document
    .querySelectorAll(".questionCheck:checked")
    .forEach(cb=>{

      selected.push(cb.value);

    });

  const ref =
    db.collection("exams").doc(examId);

  const docSnap =
    await ref.get();

  const oldMap =
    docSnap.data()?.visibleQuestionsByCourse || {};

  // حفظ خاص بهذه الدورة
  oldMap[CURRENT_COURSE_ID] = selected;

  // ✅ النظام الجديد
  await ref.update({

    visibleQuestionsByCourse: oldMap,

    // ✅ توافق مع النظام القديم
    visibleQuestions: selected

  });

  console.log(
    "✅ Saved:",
    CURRENT_COURSE_ID,
    selected.length
  );
}

async function saveGroupSkill(
  groupName,
  skill,
  courseId

  const examDoc =

    skill;

    groupSkillsByCourse: map
  });
await loadQuestions();

  console.log(
    "✅ saved",
    targetCourseId,

  );

async function importPDF(){

  const examId = document.getElementById("examSelect").value;

  if(!examId){
    alert("⚠️ اختر الاختبار أولاً");
    return;
  }

  const file = document.getElementById("pdfFile").files[0];

  if(!file){
    alert("اختر ملف PDF");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function(){

    try{

      const typedArray = new Uint8Array(this.result);
      const pdf = await pdfjsLib.getDocument(typedArray).promise;

      let fullText = "";

      for(let i = 1; i <= pdf.numPages; i++){

        const page = await pdf.getPage(i);
        const content = await page.getTextContent();

        let line = "";
        let lastY = null;

        content.items.forEach(item => {

          if(
            lastY === null ||
            Math.abs(item.transform[5] - lastY) < 5
          ){
            line += item.str + " ";
          }else{
            fullText += line + "\n\n";
            line = item.str + " ";
          }

          lastY = item.transform[5];
        });

        fullText += line + "\n\n";
      }

console.log("PDF TEXT:", fullText);

await processTextToQuestions(fullText);
    }catch(err){

      console.error(err);
      alert("❌ فشل قراءة PDF");
    }

  };

  reader.readAsArrayBuffer(file);
}

function convertWordHtmlToImportText(html){

  return String(html || "")

    // ✅ نحفظ البولد كعلامة خاصة
    .replace(/<strong[^>]*>/gi, "[[BOLD]]")
    .replace(/<\/strong>/gi, "[[/BOLD]]")
    .replace(/<b[^>]*>/gi, "[[BOLD]]")
    .replace(/<\/b>/gi, "[[/BOLD]]")

    // ✅ تحويل فقرات Word إلى أسطر
    .replace(/<br\s*\/?>/gi, "\n")
    .replace(/<\/p>/gi, "\n")
    .replace(/<p[^>]*>/gi, "")

    // ✅ تنظيف باقي HTML
    .replace(/<[^>]+>/g, "")

    // ✅ رموز HTML
    .replace(/&nbsp;/gi, " ")
    .replace(/&amp;/gi, "&")
    .replace(/&lt;/gi, "<")
    .replace(/&gt;/gi, ">")
    .replace(/&quot;/gi, '"')
    .replace(/&#39;/gi, "'")

    .replace(/\n{3,}/g, "\n\n")
    .trim();
}

async function unlinkQuestion(questionId){

  try{

    if(!confirm("Remove this link only?")) return;

    const ref =
      db.collection("questions").doc(questionId);

    const docSnap = await ref.get();

    if(!docSnap.exists){

      alert("Question not found");

      return;
    }

    const q = docSnap.data() || {};

    // جميع الدورات المرتبط بها السؤال
    let used =
      Array.isArray(q.coursesUsed)
        ? q.coursesUsed
        : [];

    // حذف الدورة الحالية فقط
    used = used.filter(c => {

      return String(c.courseId || "").trim() !==
             String(CURRENT_COURSE_ID || "").trim();

    });

    // ====================================
    // إذا بقيت دورات أخرى
    // ====================================

    if(used.length > 0){

      const first = used[0];

      await ref.update({

        // جميع الدورات المتبقية
        coursesUsed: used,

        // أول دورة تصبح الرئيسية
        linkedCourseId:
          first.courseId || "",

        linkedCourseName:
          first.TrainingCourse || "",

        linkedTrainer:
          first.Trainer || "",

        linkedPeriod:
          first.Period || ""

      });

    }

    // ====================================
    // إذا لم يبق أي دورة
    // ====================================

    else{

      await ref.update({

        coursesUsed: [],

        linkedCourseId:
          firebase.firestore.FieldValue.delete(),

        linkedCourseName:
          firebase.firestore.FieldValue.delete(),

        linkedTrainer:
          firebase.firestore.FieldValue.delete(),

        linkedPeriod:
          firebase.firestore.FieldValue.delete()

      });

    }

    alert("✅ Link removed only");

    // إعادة تحميل الأسئلة
    await loadQuestions(CURRENT_PREVIEW_EXAM);

  }catch(err){

    console.error(err);

    alert("❌ Failed to remove link");

  }

  alert(

    lockState
      ? "□ Questions Locked"
      : "□ Questions Unlocked"

  );

  await loadQuestions();
}
async function openFullQuestions(examId){

  const modal = document.getElementById("questionsModal");
  const title = document.getElementById("modalTitle");
  const body  = document.getElementById("modalQuestions");

  function fixQ(text){
    text = String(text || "").trim();

    if(text.startsWith("?")){
      text = text.replace(/^\?+\s*/, "").trim() + "?";
    }

    return text;
  }

  modal.style.display = "flex";
  body.innerHTML = "⏳ Loading...";

  try{

    const examDoc = await db.collection("exams")
      .doc(examId)
      .get();

    const examTitle = examDoc.exists
      ? examDoc.data().title || "Questions"
      : "Questions";

    title.innerHTML = "□ " + esc(examTitle);

    const snap = await db.collection("questions")
      .where("examId","==",examId)
      .get();

    if(snap.empty){
      body.innerHTML = `
        <div style="
          text-align:center;
          padding:40px;
          color:#6b7280;
          font-weight:900;
          font-size:22px;
        ">
          No questions found in this exam
        </div>
      `;
      return;
    }

    let questions = snap.docs.map(doc => ({
      id: doc.id,
      ...doc.data()
    }));

    questions.sort((a,b)=>
      Number(a.order || 0) - Number(b.order || 0)
    );

    let html = `
      <div style="
        direction:ltr;
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:10px;
        flex-wrap:wrap;
        margin-bottom:20px;
        position:sticky;
        top:0;
        background:#fff;
        z-index:10;
        padding-bottom:12px;
      ">

        <input
          id="modalQuestionSearch"
          placeholder="Search questions..."
          oninput="filterModalQuestions(this.value)"
          style="
            flex:1;
            min-width:240px;
            padding:12px 16px;
            border:2px solid #dbeafe;
            border-radius:14px;
            font-weight:800;
            direction:ltr;
            text-align:left;
          "
        >

        <div style="
          background:#eef5ff;
          color:#164478;
          padding:12px 18px;
          border-radius:999px;
          font-weight:900;
          white-space:nowrap;
        ">
          Total Questions: ${questions.length}
        </div>

      </div>

      <div id="modalQuestionsWrap" style="direction:ltr;">
    `;

    questions.forEach((q,index)=>{

      const correct = q.correct;

      html += `
        <div class="modal-q-card" data-search="${esc(
          (q.question || "") + " " + (q.options || []).join(" ")
        ).toLowerCase()}" style="
          direction:ltr;
          text-align:left;
          background:linear-gradient(180deg,#ffffff,#f8fbff);
          border:2px solid #dbeafe;
          border-radius:22px;
          padding:18px;
          margin-bottom:18px;
          box-shadow:0 10px 25px rgba(22,68,120,.08);
        ">

          <div style="
            direction:ltr;
            display:flex;
            justify-content:space-between;
            gap:10px;
            flex-wrap:wrap;
            margin-bottom:12px;
          ">

            <div style="
              background:#164478;
              color:#fff;
              padding:7px 14px;
              border-radius:999px;
              font-weight:900;
            ">
              Q${index + 1}
            </div>

            <div style="
              background:#ecfdf5;
              color:#047857;
              padding:7px 14px;
              border-radius:999px;
              font-weight:900;
            ">
              Marks ${q.degree || 1} ⭐
            </div>

            <div style="
              background:#fef3c7;
              color:#92400e;
              padding:7px 14px;
              border-radius:999px;
              font-weight:900;
            ">
              ${esc(q.type || "mcq")}
            </div>

          </div>

          <div style="
            direction:ltr !important;
            unicode-bidi:isolate;
            text-align:center;
            font-size:22px;
            font-weight:900;
            color:#164478;
            line-height:1.8;
            margin-bottom:14px;
          ">
            ${esc(fixQ(q.question || "-"))}
          </div>

          ${
            q.mediaUrl && q.mediaType !== "none"
            ? `
              <div style="
                direction:ltr;
                margin:14px 0;
                background:#f8fafc;
                border:2px solid #dbeafe;
                border-radius:18px;
                padding:14px;
              ">
                ${
                  q.mediaType === "image"
                  ? `<img src="${q.mediaUrl}" style="
                      width:100%;
                      max-height:360px;
                      object-fit:contain;
                      border-radius:14px;
                      border:1px solid #e5e7eb;
                    ">`
                  : ""
                }

                ${
                  q.mediaType === "video"
                  ? `<video controls src="${q.mediaUrl}" style="
                      width:100%;
                      max-height:420px;
                      border-radius:14px;
                      border:1px solid #e5e7eb;
                    "></video>`
                  : ""
                }

                ${
                  q.mediaType === "audio"
                  ? `<audio controls src="${q.mediaUrl}" style="
                      width:100%;
                    "></audio>`
                  : ""
                }
              </div>
            `
            : ""
          }

          ${
            q.passage
            ? `
              <div style="
                direction:ltr !important;
                unicode-bidi:isolate;
                text-align:left;
                background:#fff7ed;
                border:1px solid #fed7aa;
                color:#9a3412;
                padding:12px;
                border-radius:14px;
                margin-bottom:12px;
                font-weight:800;
                line-height:1.8;
              ">
                ${esc(q.passage)}
              </div>
            `
            : ""
          }

          ${
            Array.isArray(q.options) && q.options.length
            ? q.options.map((op,i)=>`
              <div style="
                direction:ltr !important;
                unicode-bidi:isolate;
                text-align:left;
                padding:12px 14px;
                margin-top:8px;
                border-radius:14px;
                font-weight:900;
                background:${Number(i) === Number(correct) ? "#dcfce7" : "#f8fafc"};
                border:2px solid ${Number(i) === Number(correct) ? "#16a34a" : "#e5e7eb"};
                color:${Number(i) === Number(correct) ? "#166534" : "#374151"};
              ">
                ${String.fromCharCode(65+i)}. ${esc(op)}
                ${Number(i) === Number(correct) ? " ✅" : ""}
              </div>
            `).join("")
            : `
              <div style="
                direction:ltr;
                text-align:center;
                background:#f8fafc;
                border:2px dashed #dbeafe;
                color:#64748b;
                padding:12px;
                border-radius:14px;
                font-weight:900;
              ">
                No options for this question
              </div>
            `
          }

        </div>
      `;
    });

    html += `</div>`;

    body.innerHTML = html;

  }catch(err){

    console.error("openFullQuestions error:", err);

    body.innerHTML = `
      <div style="
        background:#fee2e2;
        color:#991b1b;
        padding:20px;
        border-radius:18px;
        font-weight:900;
        text-align:center;
        direction:ltr;
      ">
        ❌ Error while displaying questions
        <br><br>
        ${esc(err.message || err)}
      </div>
    `;
  }
}

function closeQuestionsModal(){

  document.getElementById("questionsModal")
    .style.display = "none";

}
function filterModalQuestions(value){

  value = String(value || "").toLowerCase().trim();

  document.querySelectorAll(".modal-q-card").forEach(card=>{

    const txt = card.dataset.search || "";

    card.style.display = txt.includes(value)
      ? "block"
      : "none";

  });
}
</script>
